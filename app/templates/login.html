{% extends "base.html" %}
{% block title %}Sign in · EHR Cloud{% endblock %}
{% block content %}
<section class="card center">
  <h1>Sign in</h1>
  <p class="muted small">Five failed attempts will lock the account for 15 minutes.</p>
  <form method="post" class="stack">
    <label>Username
      <input name="username" autocomplete="username" autofocus required>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
  <hr class="divider">
  <p class="muted small center-text">
    New patient? <a href="{{ url_for('signup.patient_signup') }}">Create an account</a><br>
    Healthcare provider? <a href="{{ url_for('signup.doctor_signup') }}">Register with NPI</a>
  </p>
</section>
{% endblock %}
